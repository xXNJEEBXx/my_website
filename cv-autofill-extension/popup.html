<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CV AutoFill</title>
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 250px;
      margin: 0;
      padding: 20px;
      background: #0f172a;
      color: #f8fafc;
      text-align: center;
    }
    h2 {
      margin: 0 0 5px 0;
      font-size: 18px;
      color: #38bdf8;
    }
    p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }
    button {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
      transition: all 0.2s ease;
    }
    button:hover {
      background: linear-gradient(135deg, #0369a1, #1d4ed8);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    #status {
      margin-top: 15px;
      font-size: 12px;
      color: #22c55e;
      display: none;
    }
  </style>
</head>
<body>
  <h2>CV AutoFill</h2>
  <p>Fill forms dynamically</p>
  <button id="fillBtn">🚀 Auto Expand & Fill</button>
  <div id="status">Filling completed! Check console.</div>
  <script src="popup.js"></script>
</body>
</html>
